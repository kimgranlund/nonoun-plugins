<?xml version="1.0" encoding="UTF-8"?>
<!--
  Brand Stack — canonical one-page summary of a brand's foundations.
  Six load-bearing tiers, base (cultural foundation) to surface (output).
  Fill the six tier placeholder markers via:  bin/brand-stack
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" width="768" height="768" font-family="Georgia, 'Times New Roman', serif">
  <rect width="768" height="768" fill="#f7f5f1"/>

  <!-- Tier 6 — OUTPUT (surface) -->
  <g>
    <rect x="0" y="0" width="768" height="128" fill="#e9e4db"/>
    <text x="32" y="34" font-size="13" letter-spacing="2" fill="#8a8276" font-family="Helvetica, Arial, sans-serif">06 · OUTPUT</text>
    <text x="384" y="80" font-size="20" fill="#2b2925" text-anchor="middle">{OUTPUT}</text>
  </g>

  <!-- Tier 5 — EXPRESSION -->
  <g>
    <rect x="0" y="128" width="768" height="128" fill="#ded7ca"/>
    <text x="32" y="162" font-size="13" letter-spacing="2" fill="#857c6c" font-family="Helvetica, Arial, sans-serif">05 · EXPRESSION</text>
    <text x="384" y="208" font-size="20" fill="#2b2925" text-anchor="middle">{EXPRESSION}</text>
  </g>

  <!-- Tier 4 — IDENTITY -->
  <g>
    <rect x="0" y="256" width="768" height="128" fill="#d2c9b7"/>
    <text x="32" y="290" font-size="13" letter-spacing="2" fill="#7c7361" font-family="Helvetica, Arial, sans-serif">04 · IDENTITY</text>
    <text x="384" y="336" font-size="20" fill="#2b2925" text-anchor="middle">{IDENTITY}</text>
  </g>

  <!-- Tier 3 — BRAND IDEA -->
  <g>
    <rect x="0" y="384" width="768" height="128" fill="#c4b8a1"/>
    <text x="32" y="418" font-size="13" letter-spacing="2" fill="#6f6553" font-family="Helvetica, Arial, sans-serif">03 · BRAND IDEA</text>
    <text x="384" y="464" font-size="22" font-style="italic" fill="#241f18" text-anchor="middle">{BRAND_IDEA}</text>
  </g>

  <!-- Tier 2 — STRATEGY -->
  <g>
    <rect x="0" y="512" width="768" height="128" fill="#b3a587"/>
    <text x="32" y="546" font-size="13" letter-spacing="2" fill="#615739" font-family="Helvetica, Arial, sans-serif">02 · STRATEGY</text>
    <text x="384" y="592" font-size="20" fill="#241f18" text-anchor="middle">{STRATEGY}</text>
  </g>

  <!-- Tier 1 — CULTURAL FOUNDATION (base) -->
  <g>
    <rect x="0" y="640" width="768" height="128" fill="#9e8e6b"/>
    <text x="32" y="674" font-size="13" letter-spacing="2" fill="#4f4226" font-family="Helvetica, Arial, sans-serif">01 · CULTURAL FOUNDATION</text>
    <text x="384" y="720" font-size="20" fill="#1d1810" text-anchor="middle">{CULTURAL_FOUNDATION}</text>
  </g>
</svg>
