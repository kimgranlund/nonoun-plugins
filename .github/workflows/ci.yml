name: ci

# Product catalog gates — validate brand-forge + product-forge + the marketplace with the plugins-factory gate
# suite, VENDORED into tools/gates/ from the sibling nonoun-factory repo (D-18 split) and drift-checked against it
# (tools/sync-gates.py --check). Stdlib Python only; clean-checkout-true.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      G: tools/gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: vendored gates in sync with nonoun-factory (cross-repo drift gate)
        run: python3 tools/sync-gates.py --check

      - name: validator selftest
        run: python3 "$G/validate_plugin.py" selftest

      - name: validate plugin — brand-forge
        run: python3 "$G/validate_plugin.py" plugin brand-forge --strict

      - name: validate plugin — product-forge
        run: python3 "$G/validate_plugin.py" plugin product-forge --strict

      - name: validate marketplace
        run: python3 "$G/validate_plugin.py" marketplace .

      - name: catalog index.html — selftest (R-1 guard) + up to date
        run: |
          python3 gen-index.py selftest
          python3 gen-index.py --check

      - name: workflow path liveness (selftest + check)
        run: |
          python3 check-ci-paths.py selftest
          python3 check-ci-paths.py

      - name: corpus-reader vendored copies in sync (canonical lives in tools/, D-14)
        run: python3 tools/sync-corpus-reader.py --check

      - name: corpus-reader — demo corpus builds + --init scaffold
        run: |
          python3 tools/corpus-reader/build-sitemap.py demo-corpus
          python3 -c "import json; assert json.load(open('tools/corpus-reader/lib/sitemap.json')).get('theme') == 'demo-corpus/theme.css'"
          cp -R tools/corpus-reader/demo-corpus /tmp/demo
          python3 tools/corpus-reader/build-sitemap.py --init /tmp/demo
          test -f /tmp/demo/site/lib/sitemap.json

      - name: corpus-reader — bake produces a safe single file
        run: |
          python3 "$G/check-bake-safety.py" selftest
          cp -R tools/corpus-reader/demo-corpus /tmp/demo-bake
          python3 tools/corpus-reader/build-sitemap.py --bake /tmp/demo-bake
          python3 "$G/check-bake-safety.py" /tmp/demo-bake/reader.html --emit-bundle /tmp/bk.mjs
          node --check /tmp/bk.mjs

      - name: corpus-reader — JS parses (ES modules)
        run: |
          for f in tools/corpus-reader/lib/corpus-reader.js tools/corpus-reader/lib/components/*.js; do
            cp "$f" /tmp/chk.mjs && node --check /tmp/chk.mjs || { echo "PARSE FAIL: $f"; exit 1; }
          done

      - name: reference-lint — brand-forge / product-forge
        run: |
          python3 "$G/reference-lint.py" brand-forge
          python3 "$G/reference-lint.py" product-forge

      - name: manifest-sync gate (selftest + every plugin)
        run: |
          python3 "$G/check-manifest-sync.py" selftest
          for p in brand-forge product-forge; do
            python3 "$G/check-manifest-sync.py" "$p"
          done

      - name: brand-forge MCP guard selftest
        run: python3 brand-forge/bin/brand-corpus-mcp.py selftest

      - name: brand-forge — corpus tools (migrate flat⟷folder + provenance/sources audit)
        run: |
          python3 brand-forge/bin/corpus-migrate selftest
          python3 brand-forge/bin/corpus-provenance selftest

      - name: brand-forge — concept-consistency gate (no retired seat-vocabulary)
        run: |
          python3 brand-forge/bin/check-concepts.py selftest
          python3 brand-forge/bin/check-concepts.py

      - name: brand-forge — stamped plugin passes the validator (S9/S10)
        run: |
          python3 brand-forge/bin/brand-stamp plugin brand-forge/evals/stamp-smoke/corpus --name smoke -o /tmp/stamp-smoke
          python3 "$G/validate_plugin.py" plugin /tmp/stamp-smoke/plugin/smoke-brand --strict

      - name: MCP liveness gate (selftest + every bundled server actually serves)
        run: |
          python3 "$G/check-mcp-liveness.py" selftest
          python3 "$G/check-mcp-liveness.py" marketplace . --trusted-source

      - name: trust-boundary gate (every reviewer carries the untrusted-DATA-never-instructions guard)
        run: |
          python3 "$G/check-trust-boundary.py" selftest
          python3 "$G/check-trust-boundary.py" marketplace .

      - name: integration-contract gate (entry/router thinness + advisory bundled hook)
        run: |
          python3 "$G/check-integration-contract.py" selftest
          python3 "$G/check-integration-contract.py" marketplace .
          python3 "$G/check-integration-contract.py" marketplace . --trusted-source

      - name: marketplace-DX gate (scannable browse card + category/tag hygiene)
        run: |
          python3 "$G/check-marketplace-dx.py" selftest
          python3 "$G/check-marketplace-dx.py" marketplace .

      - name: context-cost audit (P6 always-on context tax)
        run: |
          python3 "$G/context-cost.py" selftest
          python3 "$G/context-cost.py" marketplace .
          python3 "$G/context-cost.py" marketplace . --with-mcp --trusted-source

      - name: checker-recall gate (council-calibration checkers aren't brittle)
        run: |
          python3 "$G/check-recall.py" selftest
          python3 "$G/check-recall.py" tools/gates/recall-corpus/*.recall.json

      - name: score-record gate (the judge's durable D8 audit trail is well-formed)
        run: |
          python3 "$G/score-record.py" selftest
          for f in tools/gates/scores/*.json; do python3 "$G/score-record.py" validate "$f"; done

      - name: brand-forge — council-calibration baselines (strategy + design + voice + muse)
        run: |
          python3 brand-forge/evals/council-calibration/check.py brand-forge/evals/council-calibration/runs/2026-06-04-northwind-baseline.md
          python3 brand-forge/evals/council-calibration/check-design.py brand-forge/evals/council-calibration/runs/2026-06-10-lumina-design-baseline.md
          python3 brand-forge/evals/council-calibration/check-voice.py brand-forge/evals/council-calibration/runs/2026-06-10-verve-voice-baseline.md
          python3 brand-forge/evals/council-calibration/check-muse.py brand-forge/evals/council-calibration/runs/2026-06-12-halcyon-muse-baseline.md

      - name: product-forge — sourcing gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-sourcing.py selftest
          python3 product-forge/bin/check-sourcing.py product-forge

      - name: product-forge — method-card gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-methods.py selftest
          python3 product-forge/bin/check-methods.py product-forge

      - name: product-forge — lint selftest
        run: python3 product-forge/bin/product-lint selftest

      - name: product-forge — corpus MCP guard selftest
        run: python3 product-forge/bin/product-corpus-mcp.py selftest

      - name: product-forge — council-calibration baselines (all 8 sub-councils)
        run: |
          P=product-forge/evals/council-calibration
          python3 $P/check.py            $P/runs/2026-06-10-atlas-baseline.md
          python3 $P/check-prd.py        $P/runs/2026-06-10-pulse-prd-baseline.md
          python3 $P/check-trust.py      $P/runs/2026-06-12-aura-trust-baseline.md
          python3 $P/check-ai-product.py $P/runs/2026-06-12-sentry-ai-product-baseline.md
          python3 $P/check-discovery.py    $P/runs/2026-06-12-beacon-discovery-baseline.md
          python3 $P/check-ux.py           $P/runs/2026-06-12-quickcart-ux-baseline.md
          python3 $P/check-architecture.py $P/runs/2026-06-12-nimbus-architecture-baseline.md
          python3 $P/check-content.py      $P/runs/2026-06-12-flow-content-baseline.md
          python3 $P/check-service.py      $P/runs/2026-06-12-concierge-service-baseline.md
