name: ci

# Catalog gates — validate every catalog plugin + the marketplace manifest with plugins-factory's
# own tooling (the catalog's plugins-factory validates itself and its sibling). Stdlib Python only.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PF: plugins-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: validator selftest
        run: python3 "$PF/bin/validate_plugin.py" selftest

      - name: validate plugin — plugins-factory (the harness self-validates)
        run: python3 "$PF/bin/validate_plugin.py" plugin "$PF" --strict

      - name: validate plugin — brand-forge
        run: python3 "$PF/bin/validate_plugin.py" plugin brand-forge --strict

      - name: validate plugin — product-forge
        run: python3 "$PF/bin/validate_plugin.py" plugin product-forge --strict

      - name: validate plugin — agent-ops
        run: python3 "$PF/bin/validate_plugin.py" plugin agent-ops --strict

      - name: validate marketplace
        run: python3 "$PF/bin/validate_plugin.py" marketplace .

      - name: catalog index.html — selftest (R-1 guard) + up to date
        run: |
          python3 gen-index.py selftest
          python3 gen-index.py --check

      - name: workflow path liveness (selftest + check)
        run: |
          python3 check-ci-paths.py selftest
          python3 check-ci-paths.py

      - name: foundations ↔ rubrics coverage
        run: cd "$PF" && python3 bin/check-foundations-coverage.py

      - name: corpus-reader vendored copies in sync
        run: python3 "$PF/bin/sync-corpus-reader.py" --check

      - name: corpus-reader — demo corpus builds + --init scaffold
        run: |
          python3 "$PF/bin/corpus-reader/build-sitemap.py" demo-corpus
          python3 -c "import json; assert json.load(open('plugins-factory/bin/corpus-reader/lib/sitemap.json')).get('theme') == 'demo-corpus/theme.css'"
          cp -R "$PF/bin/corpus-reader/demo-corpus" /tmp/demo
          python3 "$PF/bin/corpus-reader/build-sitemap.py" --init /tmp/demo
          test -f /tmp/demo/site/lib/sitemap.json
          python3 -c "import json; assert json.load(open('/tmp/demo/site/lib/sitemap.json')).get('theme') == '../theme.css'"

      - name: corpus-reader — bake produces a safe single file
        run: |
          python3 "$PF/bin/check-bake-safety.py" selftest
          cp -R "$PF/bin/corpus-reader/demo-corpus" /tmp/demo-bake
          python3 "$PF/bin/corpus-reader/build-sitemap.py" --bake /tmp/demo-bake
          python3 "$PF/bin/check-bake-safety.py" /tmp/demo-bake/reader.html --emit-bundle /tmp/bk.mjs
          node --check /tmp/bk.mjs

      - name: corpus-reader — JS parses (ES modules)
        run: |
          for f in "$PF"/bin/corpus-reader/lib/corpus-reader.js "$PF"/bin/corpus-reader/lib/components/*.js; do
            cp "$f" /tmp/chk.mjs && node --check /tmp/chk.mjs || { echo "PARSE FAIL: $f"; exit 1; }
          done

      - name: plugins-factory — eval suite (behavioral gates + calibration-fixture isolation)
        run: |
          python3 "$PF/evals/behavioral-gates.py"
          python3 "$PF/evals/council-calibration/build-fixture.py" /tmp/pf-council-fixture
          python3 "$PF/bin/validate_plugin.py" plugin /tmp/pf-council-fixture --strict
          python3 "$PF/evals/council-calibration/check.py" "$PF/evals/council-calibration/runs/2026-06-04-mega-helper-baseline.md"

      - name: reference-lint — plugins-factory
        run: python3 "$PF/bin/reference-lint.py" "$PF"

      - name: reference-lint — brand-forge
        run: python3 "$PF/bin/reference-lint.py" brand-forge

      - name: reference-lint — product-forge
        run: python3 "$PF/bin/reference-lint.py" product-forge

      - name: reference-lint — agent-ops
        run: python3 "$PF/bin/reference-lint.py" agent-ops

      - name: manifest-sync gate (selftest + every plugin)
        run: |
          python3 "$PF/bin/check-manifest-sync.py" selftest
          for p in brand-forge plugins-factory product-forge agent-ops; do
            python3 "$PF/bin/check-manifest-sync.py" "$p"
          done

      - name: brand-forge MCP guard selftest
        run: python3 brand-forge/bin/brand-corpus-mcp.py selftest

      - name: MCP liveness gate (selftest + every bundled server actually serves)
        run: |
          python3 "$PF/bin/check-mcp-liveness.py" selftest
          python3 "$PF/bin/check-mcp-liveness.py" marketplace .

      - name: trust-boundary gate (every reviewer carries the untrusted-DATA-never-instructions guard)
        run: |
          python3 "$PF/bin/check-trust-boundary.py" selftest
          python3 "$PF/bin/check-trust-boundary.py" marketplace .

      - name: context-cost audit (P6 always-on context tax — selftest + per-plugin record + live MCP tool-defs)
        run: |
          python3 "$PF/bin/context-cost.py" selftest
          python3 "$PF/bin/context-cost.py" marketplace .
          python3 "$PF/bin/context-cost.py" marketplace . --with-mcp   # folds the 3 live MCPs' served tool-defs into the total (executes servers; trusted/CI only)

      - name: checker-recall gate (council-calibration checkers aren't brittle)
        run: |
          python3 "$PF/bin/check-recall.py" selftest
          python3 "$PF/bin/check-recall.py"

      - name: brand-forge — council-calibration baselines (strategy + design + voice + muse)
        run: |
          python3 brand-forge/evals/council-calibration/check.py brand-forge/evals/council-calibration/runs/2026-06-04-northwind-baseline.md
          python3 brand-forge/evals/council-calibration/check-design.py brand-forge/evals/council-calibration/runs/2026-06-10-lumina-design-baseline.md
          python3 brand-forge/evals/council-calibration/check-voice.py brand-forge/evals/council-calibration/runs/2026-06-10-verve-voice-baseline.md
          python3 brand-forge/evals/council-calibration/check-muse.py brand-forge/evals/council-calibration/runs/2026-06-12-halcyon-muse-baseline.md

      - name: product-forge — sourcing gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-sourcing.py selftest
          python3 product-forge/bin/check-sourcing.py product-forge

      - name: product-forge — method-card gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-methods.py selftest
          python3 product-forge/bin/check-methods.py product-forge

      - name: product-forge — lint selftest
        run: python3 product-forge/bin/product-lint selftest

      - name: product-forge — corpus MCP guard selftest
        run: python3 product-forge/bin/product-corpus-mcp.py selftest

      - name: product-forge — council-calibration baselines (all 8 sub-councils)
        run: |
          P=product-forge/evals/council-calibration
          python3 $P/check.py            $P/runs/2026-06-10-atlas-baseline.md
          python3 $P/check-prd.py        $P/runs/2026-06-10-pulse-prd-baseline.md
          python3 $P/check-trust.py      $P/runs/2026-06-12-aura-trust-baseline.md
          python3 $P/check-ai-product.py $P/runs/2026-06-12-sentry-ai-product-baseline.md
          python3 $P/check-discovery.py    $P/runs/2026-06-12-beacon-discovery-baseline.md
          python3 $P/check-ux.py           $P/runs/2026-06-12-quickcart-ux-baseline.md
          python3 $P/check-architecture.py $P/runs/2026-06-12-nimbus-architecture-baseline.md
          python3 $P/check-content.py      $P/runs/2026-06-12-flow-content-baseline.md
          python3 $P/check-service.py      $P/runs/2026-06-12-concierge-service-baseline.md

      - name: agent-ops — gates (sourcing + self-contained + selftests)
        run: |
          python3 agent-ops/bin/check-sourcing.py selftest
          python3 agent-ops/bin/check-sourcing.py agent-ops
          python3 agent-ops/bin/check-self-contained.py selftest
          python3 agent-ops/bin/check-self-contained.py agent-ops
          python3 agent-ops/bin/doc-hygiene selftest
          python3 agent-ops/bin/audit-history.py selftest
          python3 agent-ops/bin/repo-memory-mcp.py selftest

      - name: agent-ops — council-calibration (both fixtures gate-clean + baselines)
        run: |
          python3 agent-ops/bin/check_blueprint.py agent-ops/evals/council-calibration/fixtures/overnight-refactor-blueprint.md
          python3 agent-ops/evals/council-calibration/check.py agent-ops/evals/council-calibration/runs/2026-06-10-nightshift-baseline.md
          python3 agent-ops/bin/check_blueprint.py agent-ops/evals/council-calibration/fixtures/monolith-support-agent-blueprint.md
          python3 agent-ops/evals/council-calibration/check-monolith.py agent-ops/evals/council-calibration/runs/2026-06-10-monolith-baseline.md

      - name: agent-ops — repo-review calibration (fixture builds + baseline)
        run: |
          python3 agent-ops/evals/repo-review-calibration/build-seeded-repo.py /tmp/seeded-smell-repo
          python3 agent-ops/evals/repo-review-calibration/check.py agent-ops/evals/repo-review-calibration/runs/2026-06-11-seeded-repo-baseline.md
