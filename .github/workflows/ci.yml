name: ci

# Catalog gates — validate every catalog plugin + the marketplace manifest with plugins-factory's
# own tooling (the catalog's plugins-factory validates itself and its sibling). Stdlib Python only.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PF: plugins-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: validator selftest
        run: python3 "$PF/bin/validate_plugin.py" selftest

      - name: validate plugin — plugins-factory (the harness self-validates)
        run: python3 "$PF/bin/validate_plugin.py" plugin "$PF" --strict

      - name: validate plugin — brand-forge
        run: python3 "$PF/bin/validate_plugin.py" plugin brand-forge --strict

      - name: validate plugin — product-forge
        run: python3 "$PF/bin/validate_plugin.py" plugin product-forge --strict

      - name: validate plugin — agent-ops
        run: python3 "$PF/bin/validate_plugin.py" plugin agent-ops --strict

      - name: validate marketplace
        run: python3 "$PF/bin/validate_plugin.py" marketplace .

      - name: catalog index.html up to date
        run: python3 gen-index.py --check

      - name: foundations ↔ rubrics coverage
        run: cd "$PF" && python3 bin/check-foundations-coverage.py

      - name: corpus-reader vendored copies in sync
        run: python3 "$PF/bin/sync-corpus-reader.py" --check

      - name: plugins-factory — eval suite (behavioral gates + calibration-fixture isolation)
        run: |
          python3 "$PF/evals/behavioral-gates.py"
          python3 "$PF/evals/council-calibration/build-fixture.py" /tmp/pf-council-fixture
          python3 "$PF/bin/validate_plugin.py" plugin /tmp/pf-council-fixture --strict
          python3 "$PF/evals/council-calibration/check.py" "$PF/evals/council-calibration/runs/2026-06-04-mega-helper-baseline.md"

      - name: reference-lint — plugins-factory
        run: python3 "$PF/bin/reference-lint.py" "$PF"

      - name: reference-lint — brand-forge
        run: python3 "$PF/bin/reference-lint.py" brand-forge

      - name: reference-lint — product-forge
        run: python3 "$PF/bin/reference-lint.py" product-forge

      - name: reference-lint — agent-ops
        run: python3 "$PF/bin/reference-lint.py" agent-ops

      - name: manifest-sync gate (selftest + every plugin)
        run: |
          python3 "$PF/bin/check-manifest-sync.py" selftest
          for p in brand-forge plugins-factory product-forge agent-ops; do
            python3 "$PF/bin/check-manifest-sync.py" "$p"
          done

      - name: brand-forge MCP guard selftest
        run: python3 brand-forge/bin/brand-corpus-mcp.py selftest

      - name: brand-forge — council-calibration baseline
        run: python3 brand-forge/evals/council-calibration/check.py brand-forge/evals/council-calibration/runs/2026-06-04-northwind-baseline.md

      - name: product-forge — sourcing gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-sourcing.py selftest
          python3 product-forge/bin/check-sourcing.py product-forge

      - name: product-forge — method-card gate (selftest + scan)
        run: |
          python3 product-forge/bin/check-methods.py selftest
          python3 product-forge/bin/check-methods.py product-forge

      - name: product-forge — lint selftest
        run: python3 product-forge/bin/product-lint selftest

      - name: agent-ops — gates (sourcing + self-contained + selftests)
        run: |
          python3 agent-ops/bin/check-sourcing.py selftest
          python3 agent-ops/bin/check-sourcing.py agent-ops
          python3 agent-ops/bin/check-self-contained.py selftest
          python3 agent-ops/bin/check-self-contained.py agent-ops
          python3 agent-ops/bin/doc-hygiene selftest
          python3 agent-ops/bin/audit-history.py selftest
