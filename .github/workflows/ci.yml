name: ci

# Catalog gates — validate every catalog plugin + the marketplace manifest with plugins-factory's
# own tooling (the catalog's plugins-factory validates itself and its sibling). Stdlib Python only.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PF: plugins-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: validator selftest
        run: python3 "$PF/bin/validate_plugin.py" selftest

      - name: validate plugin — plugins-factory (the harness self-validates)
        run: python3 "$PF/bin/validate_plugin.py" plugin "$PF" --strict

      - name: validate plugin — brand-forge
        run: python3 "$PF/bin/validate_plugin.py" plugin brand-forge --strict

      - name: validate plugin — adia-ui-factory
        run: python3 "$PF/bin/validate_plugin.py" plugin adia-ui-factory --strict

      - name: validate marketplace
        run: python3 "$PF/bin/validate_plugin.py" marketplace .

      - name: foundations ↔ rubrics coverage
        run: cd "$PF" && python3 bin/check-foundations-coverage.py

      - name: reference-lint — plugins-factory
        run: python3 "$PF/bin/reference-lint.py" "$PF"

      - name: reference-lint — brand-forge
        run: python3 "$PF/bin/reference-lint.py" brand-forge

      - name: reference-lint — adia-ui-factory
        run: python3 "$PF/bin/reference-lint.py" adia-ui-factory

      - name: adia-ui-factory scaffolder selftest
        run: python3 adia-ui-factory/bin/adia-scaffold selftest
